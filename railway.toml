# Railway — конфигурация для Onlook
# https://docs.railway.app/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
healthcheckInterval = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# Custom Start Command (опционально) — миграции при каждом старте:
# bun db:push && /start-server.sh
